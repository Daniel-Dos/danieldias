name: Feature to Developer PR

on:
  push:
    branches:
      - 'feature/**'

jobs:
  build-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: npm install
        run: npm install
    
      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

      - name: Create PR if not exists
        run: |
          gh pr create \
            --base developer \
            --head "${{ github.ref_name }}" \
            --title "Auto PR: ${{ github.ref_name }} → developer" \
            --body "PR automático criado pela pipeline." \
          || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
