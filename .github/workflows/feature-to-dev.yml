name: Feature Branch CI and Auto PR

on:
  push:
    branches:
      - "feature/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  ci-and-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

      - name: Create PR if not exists
        run: |
          gh pr create \
            --base developer \
            --head "${{ github.ref_name }}" \
            --title "Auto PR: ${{ github.ref_name }} → developer" \
            --body "PR automático criado pela pipeline para a branch **${{ github.ref_name }}**. Verifique as alterações antes de mergear." \
            --label "auto-pr" \
          || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}