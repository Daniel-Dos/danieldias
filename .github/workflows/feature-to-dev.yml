name: Feature Branch CI and Auto PR

on:
  push:
    branches:
      - "feature/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  ci-and-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

      - name: Create PR if not exists
        run: |
          gh pr create \
            --base developer \
            --head "${{ github.ref_name }}" \
            --title "Auto PR: ${{ github.ref_name }} → developer" \
            --body "## 📦 Pull Request Automático
            Este PR foi criado automaticamente pela pipeline de CI para sincronizar as alterações da branch **${{ github.ref_name }}** com a branch **developer**.
            
            ### 🔀 Branches
            - **Origem:** \`${{ github.ref_name }}\`
            - **Destino:** \`developer\`

            ### ⚙️ Validações executadas
            - ✅ Instalação de dependências
            - ✅ Lint do código
            - ✅ Execução de testes
            - ✅ Build do projeto

            ### 🧪 Status da pipeline
            - Workflow: **${{ github.workflow }}**
            - Run ID: **${{ github.run_id }}**

            ### 👀 Revisão
            Por favor revise:
            - lógica implementada
            - impacto em outras funcionalidades
            - qualidade do código
            - cobertura de testes

            ### 📌 Observação
            Este PR foi gerado automaticamente pelo workflow do **GitHub Actions**.
            ---
            🤖 Automation powered by CI
            " \
            --label "auto-pr" \
          || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}