name: Developer to Main PR

on:
  pull_request:
    types: [closed]
    branches:
      - developer

jobs:
  pr-to-main:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # para garantir todas as branches

      - name: Create Pull Request developer → main
        run: |
          gh pr create \
            --base main \
            --head developer \
            --title "Auto PR: developer → main" \
            --body "PR automático criado após merge em developer." \
          || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}